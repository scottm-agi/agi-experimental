<html>

<head>
  <title>File Browser</title>
  <script type="module">
    import { store } from "./file-browser-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.fileBrowser">
      <div class="file-browser-root">

        <!-- Loading State -->
        <div x-show="$store.fileBrowser.isLoading" class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading files...</p>
        </div>

        <!-- File Browser Content -->
        <div x-show="!$store.fileBrowser.isLoading" class="file-browser-content">
          <!-- Path navigator -->
          <div class="path-navigator">
            <button class="text-button back-button" @click="$store.fileBrowser.navigateUp()" aria-label="Navigate Up">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10.5 15">
                <path d="m.75,5.25L5.25.75m0,0l4.5,4.5M5.25.75v13.5" fill="none" stroke="currentColor"
                  stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" />
              </svg>
              Up
            </button>
            <div id="current-path"><span id="path-text" x-text="$store.fileBrowser.browser.currentPath"></span></div>

            <!-- Search box -->
            <div class="search-wrapper">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
              </svg>
              <input type="text" placeholder="Search files in current folder..."
                x-model="$store.fileBrowser.browser.searchTerm" class="search-input">
              <button x-show="$store.fileBrowser.browser.searchTerm" @click="$store.fileBrowser.browser.searchTerm = ''"
                class="search-clear" aria-label="Clear search">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                  stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Files list -->
          <div class="files-list">
            <div class="file-header">
              <div class="file-cell" @click="$store.fileBrowser.toggleSort('name')">Name <span
                  x-show="$store.fileBrowser.browser.sortBy === 'name'"
                  x-text="$store.fileBrowser.browser.sortDirection === 'asc' ? '↑' : '↓'"></span></div>
              <div class="file-cell-size" @click="$store.fileBrowser.toggleSort('size')">Size <span
                  x-show="$store.fileBrowser.browser.sortBy === 'size'"
                  x-text="$store.fileBrowser.browser.sortDirection === 'asc' ? '↑' : '↓'"></span></div>
              <div class="file-cell-date" @click="$store.fileBrowser.toggleSort('date')">Modified <span
                  x-show="$store.fileBrowser.browser.sortBy === 'date'"
                  x-text="$store.fileBrowser.browser.sortDirection === 'asc' ? '↑' : '↓'"></span></div>
            </div>

            <!-- File list entries -->
            <template x-if="$store.fileBrowser.getFilteredEntries().length">
              <template x-for="file in $store.fileBrowser.getFilteredEntries()" :key="file.path">
                <div class="file-item" :data-is-dir="file.is_dir">
                  <div class="file-name"
                    @click="file.is_dir ? $store.fileBrowser.navigateToFolder(file.path) : $store.fileBrowser.previewFile(file)">
                    <img
                      :src="'public/' + (file.type === 'unknown' ? 'file' : ($store.fileBrowser.isArchive(file.name) ? 'archive' : file.type)) + '.svg'"
                      class="file-icon" :alt="file.type" />
                    <span x-text="file.name"></span>
                  </div>
                  <div class="file-size" x-text="$store.fileBrowser.formatFileSize(file.size)"></div>
                  <div class="file-date" x-text="$store.fileBrowser.formatDate(file.modified)"></div>
                  <div class="file-actions">
                    <button class="action-button download-button" @click.stop="$store.fileBrowser.downloadFile(file)">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 19.5 19.5">
                        <path
                          d="m.75,14.25v2.25c0,1.24,1.01,2.25,2.25,2.25h13.5c1.24,0,2.25-1.01,2.25-2.25v-2.25m-4.5-4.5l-4.5,4.5m0,0l-4.5-4.5m4.5,4.5V.75"
                          fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="1.5" />
                      </svg>
                    </button>
                    <button class="delete-button" @click.stop="$store.fileBrowser.deleteFile(file)">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15.03 22.53" fill="currentColor">
                        <path
                          d="m14.55,7.82H4.68L14.09,3.19c.83-.41,1.17-1.42.77-2.25-.41-.83-1.42-1.17-2.25-.77l-3.16,1.55-.15-.31c-.22-.44-.59-.76-1.05-.92-.46-.16-.96-.13-1.39.09l-2.08,1.02c-.9.44-1.28,1.54-.83,2.44l.15.31-3.16,1.55c-.83.41-1.17,1.42-.77,2.25.29.59.89.94,1.51.94.25,0,.5-.06.74-.17l.38-.19s.09.03.14.03h11.14v11.43c0,.76-.62,1.38-1.38,1.38h-.46v-11.28c0-.26-.21-.47-.47-.47s-.47.21-.47.47v11.28h-2.39v-11.28c0-.26-.21-.47-.47-.47s-.47.21-.47.47v11.28h-2.39v-11.28c0-.26-.21-.47-.47-.47s-.47.21-.47.47v11.28h-.46c-.76,0-1.38-.62-1.38-1.38v-9.9c0-.26-.21-.47-.47-.47s-.47.21-.47.47v9.9c0,1.28,1.04,2.32,2.32,2.32h8.55c1.28,0,2.32-1.04,2.32-2.32v-11.91c0-.26-.21-.47-.47-.47Z"
                          stroke-width="0" />
                      </svg>
                    </button>
                  </div>
                </div>
              </template>
            </template>

            <!-- Empty state -->
            <template x-if="!$store.fileBrowser.getFilteredEntries().length">
              <div class="no-files">
                <span x-show="!$store.fileBrowser.browser.searchTerm">No files found</span>
                <span x-show="$store.fileBrowser.browser.searchTerm">No files match your search "<span
                    x-text="$store.fileBrowser.browser.searchTerm"></span>"</span>
              </div>
            </template>
          </div>
        </div>

        <!-- File Preview Panel (inside file-browser-root for Alpine single-root rendering) -->
        <div class="file-preview-overlay" x-show="$store.fileBrowser.preview.visible"
          x-transition:enter="transition ease-out duration-200" x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100" x-transition:leave="transition ease-in duration-150"
          x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
          @click.self="$store.fileBrowser.closePreview()" style="display: none;">
          <div class="file-preview-panel">
            <div class="preview-header">
              <div class="preview-title">
                <span class="preview-filename" x-text="$store.fileBrowser.preview.fileName"></span>
                <span class="preview-size"
                  x-text="$store.fileBrowser.formatFileSize($store.fileBrowser.preview.fileSize)"></span>
              </div>
              <div class="preview-actions">
                <button class="preview-btn preview-download-btn"
                  @click="$store.fileBrowser.downloadFile({path: $store.fileBrowser.preview.filePath, name: $store.fileBrowser.preview.fileName})">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 19.5 19.5" width="16" height="16">
                    <path
                      d="m.75,14.25v2.25c0,1.24,1.01,2.25,2.25,2.25h13.5c1.24,0,2.25-1.01,2.25-2.25v-2.25m-4.5-4.5l-4.5,4.5m0,0l-4.5-4.5m4.5,4.5V.75"
                      fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                      stroke-width="1.5" />
                  </svg>
                  Download
                </button>
                <button class="preview-btn preview-close-btn" @click="$store.fileBrowser.closePreview()">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>
            <div class="preview-body">
              <div x-show="$store.fileBrowser.preview.isLoading" class="preview-loading">
                <div class="loading-spinner"></div>
                <p>Loading preview...</p>
              </div>
              <div x-show="!$store.fileBrowser.preview.isLoading && $store.fileBrowser.preview.isImage"
                class="preview-image-container">
                <img :src="$store.fileBrowser.preview.imageSrc" :alt="$store.fileBrowser.preview.fileName"
                  class="preview-image" />
              </div>
              <pre x-show="!$store.fileBrowser.preview.isLoading && !$store.fileBrowser.preview.isImage"
                class="preview-content"><code x-text="$store.fileBrowser.preview.content"></code></pre>
            </div>
          </div>
        </div>

      </div>
    </template>

    <!-- Modal Footer (outside template x-if so it exists immediately) -->
    <template x-if="$store.fileBrowser">
      <div class="modal-footer" data-modal-footer x-show="!$store.settings || $store.settings.file_access_enabled">
        <label class="btn btn-upload">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
          </svg>
          Upload Files
          <input type="file" multiple accept="*" @change="$store.fileBrowser.handleFileUpload" style="display:none;" />
        </label>
        <button class="btn btn-cancel" @click="$store.fileBrowser.handleClose()">Close Browser</button>
      </div>
    </template>
  </div>

  <style>
    /* File Browser Root */
    .file-browser-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 400px;
    }

    /* Loading State */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      min-height: 200px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: var(--spacing-md);
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-state p {
      color: var(--color-text-secondary);
      margin: 0;
    }

    /* File Browser Content */
    .file-browser-content {
      display: flex;
      flex-direction: column;
      padding: var(--spacing-sm) var(--spacing-sm);
    }

    /* File Browser Styles */
    .files-list,
    .file-header,
    .file-item {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
    }

    /* Header Styles */
    .file-header {
      display: grid;
      grid-template-columns: 2fr 0.6fr 1fr 80px;
      background: var(--secondary-bg);
      padding: 8px 0;
      font-weight: bold;
      border-bottom: 1px solid var(--border-color);
      color: var(--color-primary);
    }

    .file-cell,
    .file-cell-size,
    .file-cell-date {
      color: var(--color-primary);
      padding: 4px;
      cursor: pointer;
    }

    /* File Item Styles */
    .file-item {
      display: grid;
      grid-template-columns: 2fr 0.6fr 1fr 80px;
      align-items: center;
      padding: 8px 0;
      font-size: 0.875rem;
      border-top: 1px solid var(--color-border);
      transition: background-color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      color: var(--color-text);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
    }

    .file-item:hover {
      background-color: var(--color-secondary);
    }

    /* File Icon and Name */
    .file-icon {
      width: 1.8rem;
      height: 1.8rem;
      margin: 0 1rem 0 0.7rem;
      vertical-align: middle;
      font-size: var(--font-size-sm);
    }

    .file-name {
      display: flex;
      align-items: center;
      font-weight: 500;
      margin-right: var(--spacing-sm);
      overflow: hidden;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .file-name>span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size,
    .file-date {
      color: var(--text-secondary);
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    /* No Files Message */
    .no-files {
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
    }

    /* Light Mode Adjustments */
    .light-mode .file-item:hover {
      background-color: var(--color-secondary-light);
    }

    /* Path Navigator Styles */
    .path-navigator {
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: var(--color-message-bg);
      padding: 0.5rem var(--spacing-sm);
      margin: 0 0 var(--spacing-sm) 0;
      border: 1px solid var(--color-border);
      border-radius: 8px;
    }

    /* Search Box Styles */
    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      flex: 1;
      max-width: 300px;
      margin-left: auto;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      width: 16px;
      height: 16px;
      color: var(--color-text-secondary);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 6px 32px 6px 34px;
      border: 1px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-background);
      color: var(--color-text);
      font-size: 0.875rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent) 20%, transparent);
    }

    .search-clear {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: var(--color-text-secondary);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .search-clear:hover {
      background-color: var(--color-secondary);
      color: var(--color-text);
    }

    .search-clear svg {
      width: 14px;
      height: 14px;
    }

    .nav-button {
      padding: 4px 12px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      background: var(--color-background);
      color: var(--color-text);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .nav-button:hover {
      background: var(--hover-bg);
    }

    .nav-button.back-button {
      background-color: var(--color-secondary);
      color: var(--color-text);
    }

    .nav-button.back-button:hover {
      background-color: var(--color-secondary-dark);
    }

    #current-path {
      opacity: 0.9;
    }

    #path-text {
      font-family: 'Roboto Mono', monospace;
      -webkit-font-optical-sizing: auto;
      font-optical-sizing: auto;
      opacity: 0.9;
    }

    /* Folder Specific Styles */
    .file-item[data-is-dir="true"] {
      cursor: pointer;
    }

    .file-item[data-is-dir="true"]:hover {
      background-color: var(--color-secondary);
    }

    /* Upload Button Styles */
    .btn-upload {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      background: var(--color-accent);
      gap: 0.5rem;
      color: white;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
    }

    .btn-upload>svg {
      width: 20px;
    }

    .btn-upload:hover {
      background-color: color-mix(in srgb, var(--color-accent) 80%, black);
    }

    .btn-upload:active {
      background-color: color-mix(in srgb, var(--color-accent) 65%, black);
    }

    /* Delete Button Styles */
    .delete-button {
      background: none;
      border: none;
      color: var(--color-primary);
      cursor: pointer;
      width: 32px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: opacity 0.2s, background-color 0.2s;
    }

    .delete-button:hover {
      color: #ff7878;
    }

    .delete-button:active {
      opacity: 0.6;
    }

    /* File Actions */
    .file-actions {
      display: flex;
      gap: var(--spacing-xs);
    }

    .action-button {
      background: none;
      border: none;
      cursor: pointer;
      width: 32px;
      padding: 6px 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }

    .download-button {
      color: var(--color-primary);
    }

    .download-button:hover {
      background-color: var(--color-border);
    }

    .light-mode .download-button:hover {
      background-color: #c6d4de;
    }

    /* Responsive Design */
    @media (max-width: 768px) {

      .file-header,
      .file-item {
        grid-template-columns: 1fr 0.5fr 80px;
      }

      .file-cell-date,
      .file-date {
        display: none;
      }
    }

    @media (max-width: 540px) {

      .file-header,
      .file-item {
        grid-template-columns: 1fr 80px;
      }

      .file-cell-size,
      .file-size,
      .file-cell-date,
      .file-date {
        display: none;
      }
    }

    /* ── File Preview Panel ─────────────────────────────────────────── */
    .file-preview-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .file-preview-panel {
      background: rgba(30, 30, 36, 0.98);
      border-radius: 12px;
      width: min(90vw, 900px);
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border: 1px solid var(--color-border);
      overflow: hidden;
      color: #fff;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border);
      background: rgba(25, 25, 32, 0.98);
      flex-shrink: 0;
    }

    .preview-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .preview-filename {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-size {
      font-size: 12px;
      color: var(--color-text-dim);
      white-space: nowrap;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .preview-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background-color 0.2s, color 0.2s;
    }

    .preview-download-btn {
      background: var(--color-accent);
      color: #fff;
    }

    .preview-download-btn:hover {
      filter: brightness(1.1);
    }

    .preview-close-btn {
      background: transparent;
      color: var(--color-text-dim);
      padding: 6px;
    }

    .preview-close-btn:hover {
      background: var(--color-border);
      color: var(--color-text);
    }

    .preview-body {
      flex: 1;
      overflow: auto;
      min-height: 200px;
    }

    .preview-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      min-height: 200px;
    }

    .preview-content {
      margin: 0;
      padding: 16px;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-all;
      color: #f0f0f0;
      background: rgba(20, 20, 26, 0.95);
      overflow-x: auto;
      tab-size: 4;
    }

    .preview-content code {
      font-family: inherit;
    }

    .preview-image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      min-height: 200px;
      background: var(--color-bg);
    }

    .preview-image {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
      border-radius: 4px;
    }

    @media (max-width: 540px) {
      .file-preview-panel {
        width: 98vw;
        max-height: 90vh;
        border-radius: 8px;
      }

      .preview-download-btn span {
        display: none;
      }
    }
  </style>
</body>

</html>
