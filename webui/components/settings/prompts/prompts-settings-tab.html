<div x-data="promptsSettings" x-init="init()" class="settings-tab-content">
    <div class="settings-header">
        <h2>Golden Prompts Management</h2>
        <p>Manage your saved high-quality prompts. These are used to guide agent behavior and provide consistent
            results.</p>
    </div>

    <div class="prompts-controls">
        <div class="search-box">
            <input type="text" x-model="searchQuery" placeholder="Search prompts by content or filename..."
                class="input-field">
        </div>

    </div>

    <div class="prompts-list-container">
        <template x-if="loading">
            <div class="loading-state">
                <span class="material-symbols-outlined spin">refresh</span> Loading golden prompts...
            </div>
        </template>

        <template x-if="!loading && filteredPrompts.length === 0">
            <div class="empty-state">
                No golden prompts found.
            </div>
        </template>

        <template x-if="!loading && filteredPrompts.length > 0">
            <table class="prompts-table">
                <thead>
                    <tr>
                        <th width="40"><input type="checkbox" :checked="allSelected" @change="selectAll()"></th>
                        <th>Prompt Content</th>
                        <th width="150" class="hide-mobile">Saved Date</th>
                        <th width="100">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="p in filteredPrompts" :key="p.filename">
                        <tr :class="{'selected': selectedPrompts.has(p.filename)}">
                            <td>
                                <input type="checkbox" :checked="selectedPrompts.has(p.filename)"
                                    @change="toggleSelect(p.filename)">
                            </td>
                            <td>
                                <div class="prompt-info">
                                    <span class="prompt-text" x-text="truncate(p.prompt, 150)"></span>
                                    <span class="prompt-filename" x-text="p.filename"></span>
                                </div>
                            </td>
                            <td x-text="formatDate(p.updated_at)" class="hide-mobile"></td>
                            <td>
                                <button class="btn btn-icon text-danger" @click="deleteSingle(p.prompt)"
                                    title="Delete golden prompt">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </template>
    </div>

    <!-- Floating Action Bar for Mass Deletion -->
    <template x-if="selectedPrompts.size > 0">
        <div class="floating-mass-action-bar" x-cloak>
            <div class="selection-count">
                <span x-text="selectedPrompts.size"></span> prompts selected
            </div>
            <button class="btn btn-danger" @click="deleteSelected()">
                <span class="material-symbols-outlined">delete_sweep</span>
                Delete Selected
            </button>
            <button class="btn btn-ghost" @click="selectedPrompts.clear()" title="Clear selection">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
    </template>
</div>

<style>
    .prompts-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        gap: 1rem;
    }

    .search-box {
        flex: 1;
    }

    .bulk-actions {
        display: flex;
        gap: 0.5rem;
    }

    .prompts-list-container {
        background: var(--bg-secondary);
        border-radius: 8px;
        border: 1px solid var(--border-color);
        max-height: 500px;
        overflow-y: auto;
    }

    .prompts-table {
        width: 100%;
        border-collapse: collapse;
    }

    .prompts-table th,
    .prompts-table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
    }

    .prompts-table th {
        background: var(--bg-tertiary);
        font-weight: 600;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .prompts-table tr:hover {
        background: var(--bg-hover);
    }

    .prompts-table tr.selected {
        background: var(--blue-transparent);
    }

    .prompt-info {
        display: flex;
        flex-direction: column;
    }

    .prompt-text {
        font-weight: 400;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.9rem;
    }

    .prompt-filename {
        font-size: 0.75rem;
        color: var(--text-muted);
        font-family: monospace;
        margin-top: 4px;
    }

    .loading-state,
    .empty-state {
        padding: 3rem;
        text-align: center;
        color: var(--text-muted);
    }
</style>
