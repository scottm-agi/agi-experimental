# Prometheus Configuration for AGIX Parallel Swarm
# This configuration scrapes metrics from the AGIX application
# and the supporting infrastructure services.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'agix-parallel'

# Alerting configuration (optional - can be extended)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files (optional - can be extended)
rule_files: []

# Scrape configurations
scrape_configs:
  # =============================================================================
  # Prometheus self-monitoring
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # =============================================================================
  # AGIX Application Metrics
  # =============================================================================
  - job_name: 'agix'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # =============================================================================
  # Redis Metrics (via Redis Exporter if deployed)
  # =============================================================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics
    # Note: Requires redis_exporter sidecar for full metrics
    # For basic health, use redis-cli ping via healthcheck

  # =============================================================================
  # Milvus Metrics
  # =============================================================================
  - job_name: 'milvus'
    static_configs:
      - targets: ['milvus:9091']
    metrics_path: /metrics
    scrape_interval: 30s

  # =============================================================================
  # Jaeger Metrics
  # =============================================================================
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']
    metrics_path: /metrics
