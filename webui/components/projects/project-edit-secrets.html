<html>

<head>
    <title>Create a new project</title>
    <script type="module">
        import { store } from "./projects-store.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.projects && $store.projects.selectedProject">
            <div>
                <!-- <div class="project-detail-header">
                        <div class="projects-project-card-title">Project details</div>
                        <div class="project-path" x-text="$store.projects.selectedProject.path"></div>
                    </div> -->


                <div class="projects-form-group">
                    <label class="projects-form-label">Sensitive variables (Secrets)</label>
                    <span class="projects-form-description">
                        Store secrets and credentials in .env format, one item per line.
                        Use <strong>UPPER_SNAKE_CASE</strong> keys, e.g. <code>GITHUB_TOKEN="ghp_abc123"</code>.
                        For project-specific secrets, prefix with project name:
                        <code>BITDRAMA-FORGEJO-TOKEN="abc"</code>.
                        See <a href="javascript:openModal('settings/secrets/example-secrets.html')">example</a>.<br>
                        These variables are masked in chat history. ⚠️ Only values ≥ 4 chars are masked.
                        <br><em>💡 Tip: Let agents set secrets via the <code>secret_set</code> tool for automatic
                            validation.</em>
                    </span>

                    <div class="kvp-editor"
                        x-data="kvpEditor({ field: { get value() { return $store.projects.selectedProject.secrets }, set value(v) { $store.projects.selectedProject.secrets = v } }, format: 'env', isSecret: true })">
                        <div class="kvp-header">
                            <div class="kvp-view-toggle">
                                <button class="kvp-view-btn" :class="{'active': view === 'list'}"
                                    @click="view = 'list'">List</button>
                                <button class="kvp-view-btn" :class="{'active': view === 'raw'}"
                                    @click="view = 'raw'">Raw</button>
                            </div>
                        </div>

                        <!-- List View -->
                        <div x-show="view === 'list'" class="kvp-list">
                            <template x-for="(item, index) in items" :key="index">
                                <div class="kvp-row">
                                    <div class="kvp-key">
                                        <input type="text" x-model="item.key" placeholder="GITHUB_TOKEN"
                                            @input="onItemChange()">
                                    </div>
                                    <div class="kvp-value-wrapper">
                                        <input
                                            :type="(isSecret || isSensitiveKey(item.key)) && !showSecrets[index] ? 'password' : 'text'"
                                            x-model="item.value" placeholder="ghp_abc123..." @input="onItemChange()">
                                        <template x-if="isSecret || isSensitiveKey(item.key)">
                                            <button type="button" class="kvp-btn-show-password"
                                                @click="toggleSecretVisibility(index)">
                                                <span class="material-symbols-outlined"
                                                    x-text="showSecrets[index] ? 'visibility_off' : 'visibility'"></span>
                                            </button>
                                        </template>
                                    </div>
                                    <button type="button" class="kvp-btn-remove" @click="removeItem(index)">
                                        <span class="material-symbols-outlined">delete</span>
                                    </button>
                                </div>
                            </template>
                            <template x-if="items.length === 0">
                                <div class="kvp-empty-message">No secrets yet. Click the button below to add one.</div>
                            </template>
                            <button type="button" class="btn btn-secondary kvp-btn-add" @click="addItem()">
                                <span class="material-symbols-outlined">add</span> Add Secret
                            </button>
                        </div>

                        <!-- Raw View -->
                        <div x-show="view === 'raw'" class="kvp-raw-view">
                            <textarea class="projects-form-textarea" x-model="$store.projects.selectedProject.secrets"
                                rows="10" placeholder="Enter project secrets" @input="parseRaw()"></textarea>
                        </div>
                    </div>
                </div>
            </div>


        </template>
    </div>
</body>
<style>
</style>

</html>
