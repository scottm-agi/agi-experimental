<html>

<head>
  <title>History</title>
  <script type="module">
    import { store } from "./history-store.js";
  </script>
</head>

<body>
  <div x-data>
    <template x-if="$store.history">
      <div class="history-modal-root">

        <div class="history-layout">
          <!-- Sidebar -->
          <div class="history-sidebar">
            <div class="sidebar-group">
              <label>Format</label>
              <button class="sidebar-btn" :class="{'active': $store.history.selectedFormat === 'markdown'}"
                @click="$store.history.switchFormat('markdown')">Markdown</button>
              <button class="sidebar-btn" :class="{'active': $store.history.selectedFormat === 'json'}"
                @click="$store.history.switchFormat('json')">JSON</button>
            </div>

            <div class="sidebar-group" x-show="$store.history.selectedFormat === 'markdown'">
              <label>View</label>
              <button class="sidebar-btn" :class="{'active': !$store.history.showPreview}"
                @click="if($store.history.showPreview) $store.history.togglePreview()">Raw</button>
              <button class="sidebar-btn" :class="{'active': $store.history.showPreview}"
                @click="if(!$store.history.showPreview) $store.history.togglePreview()">Preview</button>
            </div>
          </div>

          <!-- Main Content -->
          <div class="history-main">
            <!-- Loading State -->
            <template x-if="$store.history.isLoading">
              <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading history…</p>
              </div>
            </template>

            <!-- Error State -->
            <template x-if="$store.history.error">
              <div class="error-state">
                <p class="error-message" x-text="$store.history.error"></p>
              </div>
            </template>

            <!-- Content -->
            <template x-if="!$store.history.isLoading && !$store.history.error">
              <div class="viewer-wrapper">
                <div id="history-viewer-container" x-show="!$store.history.showPreview"></div>
                <div class="history-preview prose dark:prose-invert" x-show="$store.history.showPreview"
                  x-html="$store.history.renderedMarkdown"></div>
              </div>
            </template>
          </div>
        </div>

      </div>
    </template>
  </div>

  <style>
    .history-modal-root {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-height: 400px;
      overflow: hidden;
    }

    .history-layout {
      display: flex;
      flex-direction: row;
      flex-grow: 1;
      height: 71vh;
      overflow: hidden;
    }

    .history-sidebar {
      width: 140px;
      padding: var(--spacing-md);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      gap: var(--spacing-lg);
      background-color: var(--color-secondary);
      flex-shrink: 0;
    }

    .sidebar-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-group label {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--color-muted-foreground);
      font-weight: 600;
      margin-bottom: 2px;
      letter-spacing: 0.05em;
    }

    .sidebar-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--color-text);
      padding: 6px 12px;
      text-align: left;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .sidebar-btn:hover {
      background-color: rgba(128, 128, 128, 0.1);
    }

    .sidebar-btn.active {
      background-color: var(--color-primary);
      color: var(--color-background);
    }

    .history-main {
      flex-grow: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: var(--color-background);
    }

    .viewer-wrapper {
      flex-grow: 1;
      height: 100%;
      position: relative;
    }

    #history-viewer-container,
    .history-preview {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    .history-preview {
      padding: var(--spacing-lg);
      overflow-y: auto;
      background-color: var(--color-background);
      color: var(--color-text);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* Simple markdown styling if prose is not available */
    .history-preview h3 {
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 0.3em;
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-size: 1.25rem;
    }

    .history-preview p {
      margin-bottom: 1em;
    }

    .loading-state,
    .error-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      flex-grow: 1;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--color-border);
      border-top: 3px solid var(--color-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: var(--spacing-md);
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-state p,
    .error-state p {
      color: var(--color-muted-foreground);
      margin: 0;
    }

    .error-message {
      color: var(--color-accent);
      font-weight: 500;
    }

    /* ACE Editor Scrollbar Hide */
    #history-viewer-container::-webkit-scrollbar {
      width: 0;
    }
  </style>

</body>

</html>
