<title>Personalization Dashboard</title>
<div x-data="{}" x-init="$store.personalizationDashboard && $store.personalizationDashboard.onOpen()"
    style="padding: 1.5rem; max-width: 700px; margin: 0 auto;" x-cloak>

    <div x-show="!$store.personalizationDashboard" style="text-align: center; padding: 2rem;">
        Initializing Dashboard...
    </div>

    <template x-if="$store.personalizationDashboard">
        <div style="width: 100%;">
            <!-- Loading -->
            <template x-if="$store.personalizationDashboard.loading">
                <div style="text-align: center; padding: 3rem; color: var(--color-text-dim);">
                    <div style="display: inline-block; width: 28px; height: 28px; border: 3px solid rgba(139, 92, 246, 0.2); border-top-color: #8b5cf6; border-radius: 50%; animation: personalization-spin 0.8s linear infinite; margin-bottom: 0.75rem;"></div>
                    <div>Loading profile...</div>
                    <style>@keyframes personalization-spin { to { transform: rotate(360deg); } }</style>
                </div>
            </template>

            <!-- Error -->
            <template x-if="$store.personalizationDashboard.error">
                <div
                    style="padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #ef4444; margin-bottom: 1rem;">
                    <span x-text="$store.personalizationDashboard.error"></span>
                </div>
            </template>

            <!-- No Profile Yet -->
            <template x-if="!$store.personalizationDashboard.loading && !$store.personalizationDashboard.hasProfile">
                <div style="text-align: center; padding: 3rem; color: var(--color-text-dim);">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🔬</div>
                    <h3 style="margin: 0 0 0.5rem; color: var(--color-text);">No Profile Yet</h3>
                    <p style="margin: 0; max-width: 400px; margin: 0 auto;">
                        Your personality profile will be created after
                        <strong>3</strong> conversation turns.
                        Keep chatting and the system will learn your preferences!
                    </p>
                    <p style="margin-top: 1rem; font-size: 0.85rem;">
                        Signals collected: <strong x-text="$store.personalizationDashboard.signalCount"></strong>
                    </p>
                </div>
            </template>

            <!-- Profile Content -->
            <template x-if="!$store.personalizationDashboard.loading && $store.personalizationDashboard.hasProfile">
                <div>

                    <!-- Confidence & Stats Bar -->
                    <div
                        style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <!-- Confidence -->
                        <div
                            style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1rem; text-align: center;">
                            <div
                                style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-dim); margin-bottom: 0.25rem;">
                                Confidence</div>
                            <div style="font-size: 1.8rem; font-weight: 700;"
                                :style="{ color: $store.personalizationDashboard.confidenceColor }">
                                <span x-text="$store.personalizationDashboard.confidencePercent + '%'"></span>
                            </div>
                        </div>
                        <!-- Analysis Count -->
                        <div
                            style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1rem; text-align: center;">
                            <div
                                style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-dim); margin-bottom: 0.25rem;">
                                Analyses</div>
                            <div style="font-size: 1.8rem; font-weight: 700; color: #3b82f6;">
                                <span x-text="$store.personalizationDashboard.analysisCount"></span>
                            </div>
                        </div>
                        <!-- Signal Count -->
                        <div
                            style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1rem; text-align: center;">
                            <div
                                style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-dim); margin-bottom: 0.25rem;">
                                Signals</div>
                            <div style="font-size: 1.8rem; font-weight: 700; color: #8b5cf6;">
                                <span x-text="$store.personalizationDashboard.signalCount"></span>
                            </div>
                        </div>
                        <!-- Last Updated -->
                        <div
                            style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1rem; text-align: center;">
                            <div
                                style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-dim); margin-bottom: 0.25rem;">
                                Updated</div>
                            <div
                                style="font-size: 0.9rem; font-weight: 600; color: var(--color-text); margin-top: 0.4rem;">
                                <span x-text="$store.personalizationDashboard.lastUpdated"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Tenets (10 Dimensions) -->
                    <div
                        style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem;">
                        <h3 style="margin: 0 0 0.75rem; font-size: 1rem; font-weight: 600; color: var(--color-text);">
                            📊 Personality Dimensions
                        </h3>
                        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
                            <template x-for="(tenet, i) in $store.personalizationDashboard.tenets" :key="i">
                                <div
                                    style="padding: 0.75rem 1rem; background: rgba(236, 72, 153, 0.04); border: 1px solid var(--color-border); border-radius: 8px;">
                                    <div
                                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem;">
                                        <span style="font-size: 0.9rem; font-weight: 600; color: var(--color-text);"
                                            x-text="tenet.name"></span>
                                        <span
                                            style="font-size: 0.75rem; color: var(--color-text-dim); font-family: var(--font-family-code);"
                                            x-text="tenet.scorePercent + '%'"></span>
                                    </div>
                                    <!-- Tenet Description -->
                                    <template x-if="tenet.description">
                                        <div style="font-size: 0.8rem; color: var(--color-text-dim); line-height: 1.4; margin-bottom: 0.6rem; font-style: italic;"
                                            x-text="tenet.description"></div>
                                    </template>
                                    <div
                                        style="height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden;">
                                        <div style="height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);"
                                            :style="{ width: tenet.scorePercent + '%', background: tenet.scorePercent > 60 ? '#ec4899' : tenet.scorePercent > 40 ? '#f59e0b' : '#3b82f6' }">
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Communication Style -->
                    <div
                        style="background: var(--color-bg-sidebar); border: 1px solid var(--color-border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.25rem;">
                        <h3 style="margin: 0 0 0.75rem; font-size: 1rem; font-weight: 600; color: var(--color-text);">
                            💬 Communication Style
                        </h3>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
                            <template x-for="attr in $store.personalizationDashboard.commStyle" :key="attr.label">
                                <div
                                    style="padding: 0.6rem 0.75rem; background: rgba(59, 130, 246, 0.06); border: 1px solid rgba(59, 130, 246, 0.1); border-radius: 6px;">
                                    <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #3b82f6; margin-bottom: 0.2rem;"
                                        x-text="attr.label"></div>
                                    <div style="font-size: 0.85rem; color: var(--color-text); font-weight: 500;"
                                        x-text="attr.value">
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; padding-top: 0.5rem;">
                        <button @click="$store.personalizationDashboard.loadProfile()"
                            style="background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #3b82f6; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">
                            🔄 Refresh
                        </button>
                        <button @click="$store.personalizationDashboard.resetProfile()"
                            style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;">
                            ⚠️ Reset Profile
                        </button>
                    </div>

                </div>
            </template>
        </div>
    </template>
</div>
