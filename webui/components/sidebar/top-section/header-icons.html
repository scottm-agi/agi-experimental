<html>

<head>
</head>

<body>
  <div class="icons-section" id="hide-button" x-data>
    <!-- Sidebar Toggle Button -->
    <button id="toggle-sidebar" class="toggle-sidebar-button" @click="$store.sidebar.toggle()"
      aria-label="Toggle Sidebar" aria-expanded="false">
      <span class="material-symbols-outlined">menu</span>
    </button>

    <div id="logo-container">
      <img src="./public/agix_logo.png" alt="AGIX" width="22" height="22">
    </div>
  </div>


  <style>
    /* Icons Section Wrapper - Reserves space for absolute children */
    .icons-section {
      position: relative;
      height: 4.5rem;
      /* Sufficient height for button + margins */
      width: 100%;
      flex-shrink: 0;
    }

    /* Sidebar toggle button */
    .toggle-sidebar-button {
      height: 2.6rem;
      width: 2.6rem;
      background-color: var(--color-background);
      border: 0.1rem solid var(--color-border);
      border-radius: var(--spacing-xs);
      color: var(--color-text);
      opacity: 0.8;
      cursor: pointer;
      position: absolute;
      left: var(--spacing-md);
      top: var(--spacing-md);
      padding: 0.47rem 0.56rem;
      z-index: 999;
      -webkit-transition: all var(--transition-speed) ease-in-out;
      transition: all var(--transition-speed) ease-in-out;
    }

    .toggle-sidebar-button:hover {
      background-color: var(--color-secondary);
      opacity: 1;
    }

    .toggle-sidebar-button:active {
      opacity: 0.5;
    }


    #logo-container {
      display: -webkit-flex;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: absolute;
      /* Changed from fixed to absolute to stay in panel */
      left: 4.6rem;
      top: var(--spacing-md);
      z-index: 1004;
      -webkit-transition: margin-left var(--transition-speed) ease-in-out;
      transition: margin-left var(--transition-speed) ease-in-out;
    }

    #logo-container:hover .brand-title {
      color: var(--color-primary);
    }

    #logo-container a {
      color: inherit;
      text-decoration: none;
    }

    #logo-container img {
      border-radius: var(--spacing-xs);
      width: auto;
      height: 2.6rem;
      -webkit-transition: filter 0.3s ease;
      transition: filter 0.3s ease;
    }

    .brand-title {
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--color-text);
      transition: color 0.3s ease;
      user-select: none;
    }

    .light-mode #logo-container img {
      -webkit-filter: invert(100%) grayscale(100%);
      filter: invert(100%) grayscale(100%);
    }

    @media (max-width: 768px) {
      .toggle-sidebar-button {
        position: fixed;
        left: var(--spacing-md);
        z-index: 1004;
      }

      #logo-container {
        position: fixed;
        /* Keep fixed on mobile if needed */
        -webkit-transition: all 0.3s ease;
        transition: all 0.3s ease;
        z-index: 1004;
      }
    }
  </style>
</body>

</html>
